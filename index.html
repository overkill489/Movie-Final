<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieCast</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/23dbb71f75.js"
      crossorigin="anonymous"
    ></script>
   <script src="./index.js" defer ></script>
  </head>

  <body id="movies__body">
    <section>
      <nav>
        <div class="nav__container">
          <img class="logo" src="./personal-logo-Picsart-BackgroundRemover.png" alt="" />
          <ul class="nav__links">
            <li><a href="#" class="nav__link">Home</a></li>
            <li><a href="#" class="nav__link">Contact</a></li>
            <li><a href="#" class="nav__link nav__link--primary">Movies</a></li>
          </ul>
          <button class="btn__menu" onclick="openMenu()">
            <i class="fas fa-bars"></i>
          </button>
          <div class="menu__backdrop" style="visibility: hidden">
            <button class="btn__menu btn__menu--close" onclick="closeMenu()">
              <i class="fas fa-times"></i>
            </button>
            <ul class="menu__links">
              <li class="menu__list">
                <a href="#" class="menu__link" onclick="closeMenu()">Home</a>
              </li>
              <li class="menu__list">
                <a href="#features" class="menu__link" onclick="closeMenu()"
                  >Movies</a
                >
              </li>
              <li class="menu__list">
                <a class="menu__link no-cursor" onclick="closeMenu()"
                  >Contacts</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </section>

    <main id="movies__main">
      <section>
        <div class="container">
          <div class="row">
            <div class="movies__header">
              <h2 class="section__title movies__header--title">
                All <span class="secondary">Movies</span>
              </h2>
              <select id="filter" onchange="filterMovies(event)">
                <option value="" disabled selected>Sort</option>
                <option value="oldest-newest">Oldest to Newest</A-Z></option>
                <option value="newest-oldest">Newest to Oldest</option>
              </select>
              <search>
  <form class="search-form" onsubmit="return false">
    <input class="search-input" type="search" id="site-search" name="q" placeholder="Search the site..." aria-label="Search through site content">
    <button class="search-button" type="submit">Search</button>
  </form>
</search>
<div id="no-results-message" style="display: none;">
  <p>No matches found. Try searching for something else!</p>
</div>

            </div>
            <div class="movies">
              <i class="fas fa-spinner movies__loading--spinner"></i>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <div class="row row__column">
          <a href="#">
            <figure class="footer__logo">
              <img src="./personal-logo-Picsart-BackgroundRemover.png" class="footer__logo--img" alt="" />
            </figure>
          </a>
          <div class="footer__list">
            <a href="#" class="footer__link">Home</a>
            <a class="footer__link no-cursor">About</a>
            <a href="#features" class="footer__link">Movies</a>
            <a class="footer__link no-cursor">Contact</a>
          </div>
          <div class="footer__copyright">Copyright &copy; 2026 MovieCast</div>
        </div>
      </div>
    </footer>
  </body>
</html>
